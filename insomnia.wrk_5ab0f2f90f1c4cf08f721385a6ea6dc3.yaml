      - url: "{{base_url_gateway}}/pip"
        name: pip-csv-gw
        meta:
          id: req_0b191b01b47a4b3eba463644e796b6eb
          created: 1763074119691
          modified: 1763074119691
          isPrivate: false
          description: >-
            The test on this request asserts that the reponse has a "200 OK"
            status.


            You can check for any HTTP status code using the same mechanism, for
            example `pm.response.to.have.status(403)` if your API should return
            an "Unauthorized" response.
          sortKey: -1763074111989
        method: GET
        parameters:
          - name: country
            value: AGO
            disabled: false
          - name: year
            value: all
            disabled: false
          - name: reporting_level
            value: all
            disabled: false
          - name: fill_gaps
            value: "TRUE"
            disabled: false
          - name: format
            value: csv
            disabled: false
        scripts:
          afterResponse: |
            function csvToArray(csvString) {
                var lines = csvString.trim().split("\n");
                var headers = lines[0].split(",");
                var result = [];
                for (var i = 1; i < lines.length; i++) {
                    var obj = {};
                    var currentLine = lines[i].split(",");
                    for (var j = 0; j < headers.length; j++) {
                        obj[headers[j].trim()] = currentLine[j].trim();
                    }
                    result.push(obj);
                }
                return result;
            }


            insomnia.test("Status code is 200", function () {
                insomnia.response.to.have.status(200);
            });

            var csvData = csvToArray(insomnia.response.text());

            insomnia.test("Field is empty string", function () {
                insomnia.expect(csvData[0].decile1).to.eql("");
            });
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
